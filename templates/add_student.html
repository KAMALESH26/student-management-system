{% extends "base.html" %}

{% block title %}
Add Student
{% endblock %}

{% block content %}

<h1 class="page-title">
    Add Student
</h1>

<div class="glass-card">

    <form method="POST">

        <div class="row">

            <div class="col-md-6 mb-3">

                <label class="form-label">
                    Register Number
                </label>

                <input
                    type="text"
                    name="reg_no"
                    class="form-control"
                    required>

            </div>

            <div class="col-md-6 mb-3">

                <label class="form-label">
                    Name
                </label>

                <input
                    type="text"
                    name="name"
                    class="form-control"
                    required>

            </div>

            <div class="col-md-6 mb-3">

                <label class="form-label">
                    Department
                </label>

                <input
                    type="text"
                    name="department"
                    class="form-control"
                    required>

            </div>

            <div class="col-md-6 mb-3">

                <label class="form-label">
                    Year
                </label>

                <input
                    type="number"
                    name="year"
                    class="form-control"
                    required>

            </div>

            <div class="col-md-6 mb-3">

                <label class="form-label">
                    Email
                </label>

                <input
                    type="email"
                    name="email"
                    class="form-control">

            </div>

            <div class="col-md-6 mb-3">

                <label class="form-label">
                    Phone
                </label>

                <input
                    type="text"
                    name="phone"
                    class="form-control">

            </div>

        </div>

        <button
            type="submit"
            class="btn btn-success">

            Save Student

        </button>

    </form>

</div>

{% endblock %}
