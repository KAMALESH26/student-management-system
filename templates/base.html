<!DOCTYPE html>
<html lang="en">

<head>
    <link
        rel="icon"
        href="{{ url_for('static', filename='favicon.ico') }}">

    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>
        {% block title %}
        Student Management System
        {% endblock %}
    </title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <link rel="stylesheet"
          href="{{ url_for('static', filename='css/style.css') }}">

    <link rel="preconnect"
          href="https://fonts.googleapis.com">

    <link rel="preconnect"
          href="https://fonts.gstatic.com"
          crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap"
          rel="stylesheet">

</head>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<body>

{% if session.get('user') %}

<div class="app-container">

    <aside class="sidebar">

        <div class="logo">

            <h3>SMS</h3>

            <span>
                🎓 Student ERP
            </span>

        </div>

        <nav>

            <a href="/">
                📊 Dashboard
            </a>

            <a href="/add">
                ➕ Add Student
            </a>

            <a href="/attendance">
                📅 Attendance
            </a>

            <a href="/attendance-report">
                📈 Attendance Report
            </a>

            <a href="/marks">
                📝 Marks
            </a>

            <a href="/marks-report">
                📚 Marks Report
            </a>

            <a href="/results">
                🏆 Results
            </a>

            <a href="/logout"
               class="logout-btn">
                🚪 Logout
            </a>

        </nav>

    </aside>

    <main class="main-content">

        {% block content %}
        {% endblock %}

    </main>

</div>

{% else %}

<div class="login-wrapper">

    <div class="login-background"></div>

    {% block login_content %}
    {% endblock %}

</div>

{% endif %}

<footer class="text-center mt-5 mb-3">

    <small>

        Student ERP System • Flask + MySQL

    </small>

</footer>

</body>

</html>
