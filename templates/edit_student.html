{% extends "base.html" %}

{% block title %}
Edit Student
{% endblock %}

{% block content %}

<h1 class="page-title">
    Edit Student
</h1>

<div class="glass-card">

    <form method="POST">

        <div class="row">

            <div class="col-md-6 mb-3">

                <label class="form-label">
                    Register Number
                </label>

                <input
                    type="text"
                    name="reg_no"
                    class="form-control"
                    value="{{ student[1] }}"
                    required>

            </div>

            <div class="col-md-6 mb-3">

                <label class="form-label">
                    Name
                </label>

                <input
                    type="text"
                    name="name"
                    class="form-control"
                    value="{{ student[2] }}"
                    required>

            </div>

            <div class="col-md-6 mb-3">

                <label class="form-label">
                    Department
                </label>

                <input
                    type="text"
                    name="department"
                    class="form-control"
                    value="{{ student[3] }}"
                    required>

            </div>

            <div class="col-md-6 mb-3">

                <label class="form-label">
                    Year
                </label>

                <input
                    type="number"
                    name="year"
                    class="form-control"
                    value="{{ student[4] }}"
                    required>

            </div>

            <div class="col-md-6 mb-3">

                <label class="form-label">
                    Email
                </label>

                <input
                    type="email"
                    name="email"
                    class="form-control"
                    value="{{ student[5] }}">

            </div>

            <div class="col-md-6 mb-3">

                <label class="form-label">
                    Phone
                </label>

                <input
                    type="text"
                    name="phone"
                    class="form-control"
                    value="{{ student[6] }}">

            </div>

        </div>

        <div class="d-flex gap-2">

            <button
                type="submit"
                class="btn btn-warning">

                Update Student

            </button>

            <a href="/"
               class="btn btn-secondary">

                Cancel

            </a>

        </div>

    </form>

</div>

{% endblock %}
